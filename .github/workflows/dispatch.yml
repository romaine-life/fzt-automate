name: Dependency Update

# Auto-trigger disabled — Claude-driven CI. Run manually via
# `gh workflow run dispatch.yml -R nelsong6/fzt-automate`.
on:
  workflow_dispatch:

# The called reusable workflow declares contents:write + actions:write. Without
# these granted on the caller, the token falls back to the repo default ('read')
# and the workflow startup_failures instantly on every dispatch.
permissions:
  contents: write
  actions: write
  id-token: write

concurrency:
  # Shared with release.yml so tag-cutting is serialized across dep-update
  # and direct-push release paths (prevents patch-number races).
  group: release-tag
  cancel-in-progress: false

jobs:
  update:
    uses: romaine-life/pipeline-templates/.github/workflows/go-dependency-update-template.yml@main
    with:
      modules: github.com/nelsong6/fzt github.com/nelsong6/fzt-terminal
      # Leaf with binary artifacts: atomic release (no downstream dispatch),
      # then fire build.yml with the new tag to build + upload the three
      # OS binaries to the existing release.
      artifact-build-workflow: build.yml

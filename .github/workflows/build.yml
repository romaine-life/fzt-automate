name: Build

# Called by the dep-update template AFTER it cuts a release. Builds the three
# OS binaries and uploads them to the already-existing release. The tag is
# passed as an input — no race, no duplicated tag logic.

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build artifacts for (and upload to)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: windows
            goarch: amd64
            output: fzt-automate-windows-amd64.exe
          - goos: linux
            goarch: amd64
            output: fzt-automate-linux-amd64
          - goos: darwin
            goarch: arm64
            output: fzt-automate-darwin-arm64
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Get engine version from go.mod
        id: engine
        run: echo "version=$(grep 'github.com/romaine-life/fzt ' go.mod | awk '{print $2}')" >> $GITHUB_OUTPUT

      - run: >
          go build
          -ldflags="-X github.com/romaine-life/fzt/render.Version=${{ inputs.tag }}
          -X github.com/romaine-life/fzt-frontend.EngineVersion=${{ steps.engine.outputs.version }}"
          -o ${{ matrix.output }} .
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ inputs.tag }} ${{ matrix.output }} --clobber -R ${{ github.repository }}
